# =============================================================================
# Nginx Reverse Proxy Configuration for WAF
# =============================================================================
# Request flow: Client → Nginx:443 (TLS) → WAF:5000 → Backend:8080
#
# Features:
# - TLS 1.2/1.3 termination with strong cipher suites
# - HSTS (HTTP Strict Transport Security)
# - Security headers (X-Frame-Options, CSP, etc.)
# - Request size limits
# - Rate limiting at L7 (as additional layer)
# - Proxy buffering for performance
# - Access/error logging in JSON format
# =============================================================================

# Rate limiting zone: 10 req/sec per IP, burst of 20
limit_req_zone $binary_remote_addr zone=waf_limit:10m rate=10r/s;

# Connection limiting: max 100 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=waf_conn:10m;

# JSON log format for SIEM integration
log_format json_combined escape=json
    '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher"'
    '}';

# Upstream WAF backend
upstream waf_backend {
    server waf:5000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    # Allow health checks over HTTP
    location /waf/health {
        proxy_pass http://waf_backend;
        proxy_set_header Host $host;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    # =========================================================================
    # TLS Configuration
    # =========================================================================
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # TLS 1.2 and 1.3 only (no SSLv3, TLS 1.0, TLS 1.1)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites (ECDHE + AESGCM/CHACHA20, no RSA key exchange)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # TLS session caching for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/nginx/ssl/ca-chain.crt;

    # DH parameters for DHE ciphers (generate with: openssl dhparam -out dhparam.pem 2048)
    # ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # =========================================================================
    # Security Headers
    # =========================================================================
    # HSTS: force HTTPS for 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection (legacy, but still useful for older browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy (adjust for your application)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # =========================================================================
    # Request Limits
    # =========================================================================
    # Max request body size (should match WAF's MAX_CONTENT_LENGTH)
    client_max_body_size 10m;

    # Max header size
    large_client_header_buffers 4 8k;

    # Request timeout
    client_body_timeout 30s;
    client_header_timeout 30s;

    # =========================================================================
    # Logging
    # =========================================================================
    access_log /var/log/nginx/waf_access.log json_combined;
    error_log  /var/log/nginx/waf_error.log warn;

    # =========================================================================
    # Proxy to WAF
    # =========================================================================
    location / {
        # Rate limiting (additional layer on top of WAF's rate limiter)
        limit_req zone=waf_limit burst=20 nodelay;
        limit_conn waf_conn 100;

        # Proxy settings
        proxy_pass http://waf_backend;

        # Pass real client IP to WAF
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;

        # Don't pass server version
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Health check endpoint (no rate limiting)
    location /waf/health {
        proxy_pass http://waf_backend;
        proxy_set_header Host $host;
        limit_req off;
    }

    # Metrics endpoint (no rate limiting, internal access only)
    location /metrics {
        proxy_pass http://waf_backend;
        proxy_set_header Host $host;
        limit_req off;
        # Restrict to internal networks (uncomment and adjust)
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
