name: WAF CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ======================================
  # Unit & Integration Tests
  # ======================================
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short -x
        env:
          WAF_STORAGE_BACKEND: memory
          WAF_DASHBOARD_PASSWORD: test-secure-password-123

      - name: Run quick detection tests
        run: |
          python tests/test_waf.py --quick
        env:
          WAF_STORAGE_BACKEND: memory

  # ======================================
  # Code Quality & Linting
  # ======================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/ tests/ --select=E,W,F --ignore=E501

  # ======================================
  # Security Scanning
  # ======================================
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit safety

      - name: Run bandit (security linter)
        run: bandit -r app/ -ll --skip B101,B104
        # B101: assert usage (OK in non-production code)
        # B104: binding to 0.0.0.0 (expected for Docker)

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt || true
        # Allow failure since safety DB requires paid API key

  # ======================================
  # Docker Build Test
  # ======================================
  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t waf:test .

      - name: Test Docker health check
        run: |
          docker run -d --name waf-test \
            -e WAF_DASHBOARD_PASSWORD=secure-test-123 \
            -e WAF_STORAGE_BACKEND=memory \
            -p 5000:5000 waf:test
          
          # Wait for startup
          sleep 5
          
          # Test health endpoint
          curl -f http://localhost:5000/waf/health || exit 1
          
          docker stop waf-test
          docker rm waf-test
